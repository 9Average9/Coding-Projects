name: Auto Version Bump and Merge

on:
  push:
    branches:
      - 'claude/**'

# Skip re-running when the workflow itself pushes the version bump commit
concurrency:
  group: version-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-and-merge:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'Bump version to')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          # Read the real APP_VERSION (last ^const APP_VERSION line, skipping the comment example)
          CURRENT=$(grep '^const APP_VERSION' app.js | tail -1 | grep -oP '"[0-9]+\.[0-9]+\.[0-9]+"' | tr -d '"')
          echo "Current app version: $CURRENT"

          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Update app.js APP_VERSION (only the real declaration, not the comment example)
          sed -i "s/^const APP_VERSION = \"$CURRENT\"/const APP_VERSION = \"$NEW_VERSION\"/" app.js

          # Sync service-worker.js cache name to the same version
          OLD_CACHE=$(grep -oP 'basic-greek-trainer-v\K[0-9]+\.[0-9]+\.[0-9]+' service-worker.js)
          sed -i "s/basic-greek-trainer-v$OLD_CACHE/basic-greek-trainer-v$NEW_VERSION/" service-worker.js

          # Update ?v= cache-busters in index.html and FILES_TO_CACHE in service-worker.js
          sed -i "s/?v=[0-9][^\"']*/?v=$NEW_VERSION/g" index.html
          sed -i "s/?v=[0-9][^\"']*/?v=$NEW_VERSION/g" service-worker.js

      - name: Update UPDATE_NOTES from commit messages
        run: |
          python3 << 'PYEOF'
          import subprocess, re, json

          # Collect subjects of commits on this branch not yet on main,
          # excluding meta-commits about the tooling itself
          SKIP_PREFIXES = (
              "Bump version to",
              "Merge ",
              "Update release notes",
              "Sync ?v=",
              "Add GitHub Action",
          )

          result = subprocess.run(
              ["git", "log", "origin/main..HEAD", "--no-merges", "--pretty=format:%s"],
              capture_output=True, text=True
          )
          subjects = [
              line.strip() for line in result.stdout.splitlines()
              if line.strip() and not any(line.strip().startswith(p) for p in SKIP_PREFIXES)
          ]

          if not subjects:
              print("No user-facing commits found — leaving UPDATE_NOTES unchanged")
              exit(0)

          notes_js = "const UPDATE_NOTES = [\n"
          notes_js += ",\n".join(f"  {json.dumps(s)}" for s in subjects)
          notes_js += "\n];"

          content = open("app.js").read()
          updated = re.sub(
              r"const UPDATE_NOTES = \[.*?\];",
              notes_js,
              content,
              flags=re.DOTALL
          )
          open("app.js", "w").write(updated)
          print(f"Updated UPDATE_NOTES with {len(subjects)} entries:")
          for s in subjects:
              print(f"  • {s}")
          PYEOF

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.js service-worker.js index.html
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "Bump version to ${{ steps.bump.outputs.new_version }}"
          git push

      - name: Merge to main
        run: |
          git fetch origin main
          git checkout main
          git pull origin main
          git merge --no-ff "origin/${{ github.ref_name }}" \
            -m "Merge ${{ github.ref_name }} into main (v${{ steps.bump.outputs.new_version }})"
          git push origin main

      - name: Deploy Firestore rules
        if: ${{ secrets.FIREBASE_TOKEN != '' }}
        run: |
          npm install -g firebase-tools
          firebase deploy --only firestore:rules --token "${{ secrets.FIREBASE_TOKEN }}" --project greek-vocab-leaderboard
