<!-- Headline / style fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cinzel+Decorative:wght@700&family=Noto+Serif+JP:wght@900&family=M+PLUS+Rounded+1c:wght@800&family=Bebas+Neue&family=Orbitron:wght@800&family=Oswald:wght@700&family=Cormorant+Garamond:wght@700&family=Courgette&family=Anton:wght@400&family=Rajdhani:wght@700&family=Audiowide&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#e7eef7;
    --styleFont:'Noto Serif JP', serif;
    --styleHue:#55b7ff;
    --prevHue:#446bff;
    --nextHue:#ff8a3d;
  }
  html,body{
    height:100%; margin:0; overflow:hidden; color:var(--ink);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    background:#0b1020; /* dark base; sky canvas on top */
    touch-action: manipulation; /* blocks iOS smart double-tap zoom */
  }

  /* Sky & mist canvases */
  #sky{position:fixed; inset:0; z-index:-2}
  #mist{position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.65}

  /* Title */
  .wrap{position:fixed; inset:0; display:grid; grid-template-rows:auto 1fr auto; place-items:center; gap:12px; padding:16px}
  .title{
    font-family:'Cinzel', serif;
    font-weight:900; letter-spacing:.9px; text-transform:uppercase;
    font-size: clamp(34px, 7vw, 84px); line-height:1; text-align:center;
    color:#fafbfd;
    text-shadow:
      0 1px 0 #f2f3ff,
      0 2px 0 #e2e5fb,
      0 3px 0 #cfd4f4,
      0 4px 0 #bbc2ec,
      0 10px 22px rgba(0,0,0,.58),
      0 0 44px rgba(180,200,255,.45);
    filter: drop-shadow(0 12px 28px rgba(0,0,0,.48));
  }

  /* Carousel (no arrows) */
  .carousel{
    width:min(880px,92vw);
    display:grid; grid-template-columns:1fr; align-items:center; gap:12px;
  }

  .stage{
    position:relative;
    /* peeking room so side glows are visible */
    padding-inline: 42px; /* space for peeks */
  }

  /* Peeking “cards” (left/right edges) – slimmer & card-like */
  .peek{
    position:absolute; top:12px; bottom:12px; width:28px;
    border-radius:10px; overflow:hidden;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.10), 0 8px 20px rgba(0,0,0,.4);
    opacity:.9; pointer-events:none;
  }
  .peek.left{
    left:0;
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--prevHue) 35%, #ffffff 0%), rgba(255,255,255,.05));
  }
  .peek.right{
    right:0;
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--nextHue) 35%, #ffffff 0%), rgba(255,255,255,.05));
  }
  .peekEdge{
    position:absolute; inset:0; border-radius:10px;
    border:1px solid rgba(255,255,255,.16);
    background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
  }
  .peekGlow{
    position:absolute; inset:-26px; border-radius:14px; filter:blur(26px); opacity:.30;
    background: var(--nextHue);
  }
  .peek.left .peekGlow{ background: var(--prevHue); }

  /* Card */
  .card{
    position:relative; min-height: 395px;
    border-radius:20px; padding:18px 20px; overflow:hidden;
    background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
    border:1px solid rgba(255,255,255,.18);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), 0 18px 38px rgba(0,0,0,.5);
    display:grid; grid-template-rows:auto auto 1fr auto; gap:8px;
    backdrop-filter: blur(3px);
  }
  .aura{
    position:absolute; inset:-30%; filter:blur(56px); opacity:.28; pointer-events:none;
    background: var(--styleHue);
    animation:auraPulse 6s ease-in-out infinite;
  }
  @keyframes auraPulse{ 0%,100%{opacity:.2; transform:scale(1)} 50%{opacity:.3; transform:scale(1.06)} }

  .name{
    text-align:center; font-weight:900; letter-spacing:1.2px;
    font-size: clamp(22px, 4.2vw, 36px);
    text-transform:uppercase; font-family: var(--styleFont);
    text-shadow: 0 2px 10px color-mix(in srgb, var(--styleHue) 55%, transparent);
  }

  .desc{ margin-top:2px; text-align:center; opacity:.96; font-size:15px; font-weight:600; letter-spacing:.2px }
  .list{margin:6px 0 0 0; padding-left:18px; line-height:1.6; opacity:.95}
  .list li{ margin:4px 0; }
  .muted{ opacity:.88; }

  /* CTA inside card: [Forms] [Select] */
  .cta{ display:flex; gap:12px; align-items:center; justify-content:center; margin-top:6px; }
  .btn{
    padding:10px 16px; border-radius:10px; border:1px solid rgba(255,255,255,.22);
    font-weight:800; cursor:pointer; user-select:none; -webkit-tap-highlight-color: transparent;
    background:linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.08));
    color:#0c1220; text-shadow:0 1px 0 rgba(255,255,255,.5);
  }
  .btn.primary{
    background: var(--btnGrad,#35b3ff); color:#06121c; border-color: rgba(255,255,255,.35);
    box-shadow: 0 8px 22px rgba(255,255,255,.16), 0 0 22px var(--styleHue);
  }

  /* Forms overlay (covers card) */
  .tipsPanel{
    position:absolute; left:0; right:0; top:0; margin:auto;
    width:100%; height:0;
    overflow:hidden; border-radius:20px;
    background: rgba(12,16,26,.94);
    border:1px solid rgba(255,255,255,.18);
    box-shadow: 0 16px 36px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.05);
    transform-origin: top center;
    transition: height .28s ease, opacity .28s ease;
    opacity:0;
  }
  .tipsPanel.open{ height:100%; opacity:1; }
  .tipsHeader{
    padding:10px 14px; border-bottom:1px solid rgba(255,255,255,.12);
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0));
    display:grid; grid-template-columns:38px 1fr 38px; align-items:center; gap:6px;
  }
  .tipsName{
    text-align:center; font-weight:900; letter-spacing:.5px; font-family: var(--styleFont);
  }
  .tipsSub{
    text-align:center; font-size:12px; opacity:.8; margin-top:-2px;
  }
  .xBtn{
    width:38px; height:38px; border-radius:10px; border:1px solid rgba(255,255,255,.26);
    background:rgba(255,255,255,.14); color:#e7eef7; font-weight:900; font-size:20px; line-height:0;
    display:grid; place-items:center; cursor:pointer; justify-self:end;
  }
  .tipsBody{
    padding:12px 14px 140px; /* extra bottom space to see last tags clearly */
    max-height:calc(100% - 58px); overflow:auto;
    overscroll-behavior:contain;
  }
  details{ background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:12px; padding:8px 10px; margin:8px 0; }
  summary{ cursor:pointer; font-weight:800; outline:none; }

  .tag{
    display:inline-block; font-size:11px; padding:2px 8px; margin:4px 6px 0 0;
    border:1px solid rgba(255,255,255,.22); border-radius:999px; opacity:.95; cursor:pointer;
  }

  /* Tag info popup (bottom-center bubble with auto-hide) */
  .tagInfo{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:16px; max-width:min(520px, 92vw);
    background:rgba(20,26,38,.95); color:#e7eef7;
    border:1px solid rgba(255,255,255,.18); border-radius:12px;
    box-shadow:0 10px 24px rgba(0,0,0,.45);
    padding:10px 12px; font-size:13px; line-height:1.5;
    display:none; z-index:50;
  }
  .tagInfo.show{ display:block; }

  /* Onboarding overlay (covers cards only) */
  .onboard{
    position:absolute; left:0; right:0; top:0; bottom:0; margin:auto;
    display:grid; place-items:center; z-index:3;
    background:rgba(6,10,18,.72);
    border:1px solid rgba(255,255,255,.14);
    border-radius:18px;
    opacity:1; transition: opacity .4s ease;
  }
  .onboard.fadeOut{ opacity:0; pointer-events:none; }
  .onboardBox{
    text-align:center; padding:16px 18px;
  }
  .onboardTitle{
    font-family:'Cinzel', serif; font-weight:900; letter-spacing:.6px;
    font-size: clamp(20px, 4.6vw, 32px);
    text-transform:uppercase;
    text-shadow: 0 8px 22px rgba(0,0,0,.5), 0 0 22px rgba(180,200,255,.2);
  }
  .onboardSub{ opacity:.9; margin-top:6px; }
  .onboardClose{
    position:absolute; right:10px; top:10px;
    width:36px; height:36px; border-radius:10px;
    border:1px solid rgba(255,255,255,.22);
    background:rgba(255,255,255,.14); color:#e7eef7;
    display:grid; place-items:center; font-weight:900; cursor:pointer;
  }

  @media (max-width:480px){
    .stage{ padding-inline: 36px; }
    .peek{ width:24px; }
    .card{ min-height: 375px; }
  }
</style>

          <button class="btn primary" id="select">Select</button>
        </div>

        <!-- Forms Overlay -->
        <div class="tipsPanel" id="tipsPanel">
          <div class="tipsHeader">
            <div></div>
            <div>
              <div class="tipsName" id="tipsTitle">—</div>
              <div class="tipsSub">Forms</div>
            </div>
            <button class="xBtn" id="tipsClose">×</button>
          </div>
          <div class="tipsBody" id="tipsContent"></div>
        </div>
      </div>

      <!-- right peek -->
      <div class="peek right"><div class="peekGlow"></div><div class="peekEdge"></div></div>

      <!-- Onboarding hint (covers cards; fades away) -->
      <div class="onboard" id="onboard">
        <button class="onboardClose" id="onboardClose">×</button>
        <div class="onboardBox">
          <div class="onboardTitle">Swipe to select a breathing style to master</div>
          <div class="onboardSub">Drag left or right to browse styles</div>
        </div>
      </div>
    </div>
  </div>
</div>

    'Mobility':'Reposition or dash-like movement during the attack.',
    'Dash':'High-speed travel during the strike; often brief i-frames.',
    'Multi-hit':'Several rapid hits in one form.',
    'Pull':'Draws enemies inward.',
    'Evasion':'Improves dodge or grants brief intangibility.',
    'Speed Buff':'Temporarily increases movement/attack speed.',
    'Combo':'Chains easily into further attacks.',
    'Impact':'Heavy hit with stagger.',
    'Ramp-up':'Damage increases the longer the attack persists.',
    'Armor':'Reduces incoming damage during the form.',
    'Defense':'General mitigation or guard-like effects.',
    'Stagger Resist':'Harder to interrupt while attacking.',
    'Bind':'Restricts enemy movement briefly.',
    'Curved Arc':'Attacks follow a bending path to hit around defenses.',
    'Orbiting':'Projectiles or blades circle the user.',
    'Line AoE':'Long narrow strike hitting everything along a path',
    'Ultimate':'Signature high-power technique with long cooldown',
    'Screen-wide':'Very large radius covering most of the arena',
    'Anti-air':'Effective vs airborne targets',
    'Juggle':'Launches or keeps targets in air',
    'Close Range':'Very short reach; high risk/reward',
    'Reach':'Longer-than-normal range',
    'High Damage':'Significantly more damage than basic forms',
    'Wide Arc':'Large sweeping angle in front',
    'Blind':'Obscures enemy vision/sensing',
    'Afterimage':'Creates visual copies that confuse targeting',
    'Reveal':'Highlights enemies through fog/terrain',
    'Pierce':'Ignores part of the target’s defense',
    'Resolve':'Boost to will/HP sustain'
  };

  // ---------- Elements ----------
  const nameEl = document.getElementById('name');
  const descEl = document.getElementById('desc');
  const traitsEl = document.getElementById('traits');
  const auraEl = document.getElementById('aura');
  const cardEl = document.getElementById('card');
  const stageEl = document.getElementById('stage');
  const tipsPanel = document.getElementById('tipsPanel');
  const tipsContent = document.getElementById('tipsContent');
  const tipsTitle = document.getElementById('tipsTitle');
  const formsBtn = document.getElementById('formsBtn');
  const tipsClose = document.getElementById('tipsClose');
  const tagInfoBox = document.getElementById('tagInfo');
  const selectBtn = document.getElementById('select');
  const onboard = document.getElementById('onboard');
  const onboardClose = document.getElementById('onboardClose');

  let idx = 0;

  function renderForms(style){
    const formsList = style.forms.map(f=>{
      const tags=(f.tags||[]).map(t=>`<span class="tag" data-tag="${t}">${t}</span>`).join('');
      return `<li style="margin:6px 0 10px 0;">
        <b>Form ${f.n} — ${f.name}</b><br/>${tags}
      </li>`;
    }).join('');

    tipsContent.innerHTML =
      `<details open>
         <summary>${style.key} Forms</summary>
         <ol style="margin:6px 0 0 18px; padding:0;">${formsList}</ol>
       </details>`;
  }

  function updatePeeks() {
    const prevIdx = (idx-1+styles.length)%styles.length;
    const nextIdx = (idx+1)%styles.length;
    document.documentElement.style.setProperty('--prevHue', styles[prevIdx].hue);
    document.documentElement.style.setProperty('--nextHue', styles[nextIdx].hue);
  }

  function render(i){
    const s = styles[i];
    nameEl.textContent = `${s.key} Breathing`;
    nameEl.style.fontFamily = s.font;
    document.documentElement.style.setProperty('--styleFont', s.font);
    document.documentElement.style.setProperty('--styleHue', s.hue);

    descEl.textContent = s.desc;
    traitsEl.innerHTML = s.traits.map(t=>`<li class="muted">${t}</li>`).join('');

    auraEl.style.setProperty('--styleHue', s.hue);
    cardEl.style.setProperty('--btnGrad', s.hue);
    cardEl.style.boxShadow = `inset 0 0 0 1px rgba(255,255,255,.06), 0 18px 38px ${s.hue}33`;

    tipsTitle.textContent = `${s.key} Breathing`;
    renderForms(s);

    // Per-style tint for Forms button
    formsBtn.style.boxShadow = `0 6px 22px ${s.hue}55`;
    formsBtn.style.borderColor = s.hue;
    formsBtn.style.background = `
      radial-gradient(circle at 30% -40%, rgba(255,255,255,.4), transparent 55%),
      linear-gradient(180deg, ${s.hue}, color-mix(in srgb, ${s.hue} 55%, #000 0%))`;

    updatePeeks();
  }

  // Swipe-only navigation (disabled when Forms is open)
  let touchX=0, touchY=0, dragging=false, moved=false;

  function dismissOnboard(){
    if(!onboard) return;
    onboard.classList.add('fadeOut');
    setTimeout(()=> onboard.style.display='none', 400);
  }

  function swipeStart(x,y){
    if (tipsPanel.classList.contains('open')) return; // block when forms open
    touchX=x; touchY=y; dragging=true; moved=false;
    dismissOnboard();
  }
  function swipeMove(x,y){
    if(!dragging) return;
    const dx=x-touchX, dy=y-touchY;
    if (!moved && Math.abs(dx)>12 && Math.abs(dx)>Math.abs(dy)) moved=true;
  }
  function swipeEnd(x,y){
    if(!dragging) return; dragging=false;
    const dx=x-touchX, dy=y-touchY;
    if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){
      if(dx<0){ idx=(idx+1)%styles.length; render(idx); }
      else { idx=(idx-1+styles.length)%styles.length; render(idx); }
    }
  }

  // Touch
  stageEl.addEventListener('touchstart', e=>{
    const t=e.changedTouches[0]; swipeStart(t.clientX, t.clientY);
  }, {passive:true});
  stageEl.addEventListener('touchmove', e=>{
    const t=e.changedTouches[0]; swipeMove(t.clientX, t.clientY);
  }, {passive:true});
  stageEl.addEventListener('touchend', e=>{
    const t=e.changedTouches[0]; swipeEnd(t.clientX, t.clientY);
  }, {passive:true});

  // Mouse drag (desktop)
  stageEl.addEventListener('mousedown', e=>{ swipeStart(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e=>{ swipeMove(e.clientX, e.clientY); });
  window.addEventListener('mouseup', e=>{ swipeEnd(e.clientX, e.clientY); });

  // Forms overlay toggle
  function toggleForms(open){
    tipsPanel.classList.toggle('open', open ?? !tipsPanel.classList.contains('open'));
  }
  formsBtn.addEventListener('click', ()=> toggleForms());
  tipsClose.addEventListener('click', ()=> toggleForms(false));

  // Tag info popup (bottom-center, auto-hide)
  function showTagInfo(tag){
    const text = TAG_INFO[tag] || tag;
    tagInfoBox.textContent = `${tag}: ${text}`;
    tagInfoBox.classList.add('show');
    clearTimeout(showTagInfo._t);
    showTagInfo._t = setTimeout(()=> tagInfoBox.classList.remove('show'), 2600);
  }
  tipsContent.addEventListener('click', (e)=>{
    const t = e.target.closest('.tag'); if(!t) return;
    const tag = t.getAttribute('data-tag');
    if(tag) showTagInfo(tag);
  });

  // Select → simple toast for now
  selectBtn.addEventListener('click', () => {
    const s = styles[idx];
    tagInfoBox.textContent = `Selected: ${s.key} Breathing`;
    tagInfoBox.classList.add('show');
    clearTimeout(selectBtn._t);
    selectBtn._t = setTimeout(() => tagInfoBox.classList.remove('show'), 2000);
  });

  // ---------- Dark sky with subtle moon ----------
  const sky = document.getElementById('sky');
  const ctx = sky.getContext('2d');
  const mist = document.getElementById('mist');
  const mctx = mist.getContext('2d');

  function resize(){
    sky.width = innerWidth;  sky.height = innerHeight;
    mist.width = innerWidth; mist.height = innerHeight;
    drawStaticSky();
  }
  addEventListener('resize', resize, {passive:true});
  resize();

  function drawStaticSky(){
    const w = sky.width, h = sky.height;

    // deep night gradient
    const g = ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0, '#0f1530');
    g.addColorStop(0.55,'#0b1126');
    g.addColorStop(1, '#080e1e');
    ctx.fillStyle = g; ctx.fillRect(0,0,w,h);

    // stars
    ctx.save();
    for(let i=0;i<140;i++){
      const x = Math.random()*w, y = Math.random()*h*0.88, r = Math.random()*1.3;
      ctx.fillStyle = `rgba(230,236,255,${0.35+Math.random()*0.35})`;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // subtle moon
    const mx = w*0.82, my = h*0.18, mr = Math.min(w,h)*0.08;
    const mg = ctx.createRadialGradient(mx-mr*0.28,my-mr*0.28,mr*0.12, mx,my,mr);
    mg.addColorStop(0,'#ffffff');
    mg.addColorStop(0.35,'#e6ebff');
    mg.addColorStop(0.8,'rgba(200,210,255,0.22)');
    mg.addColorStop(1,'rgba(180,200,255,0.06)');
    ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fillStyle=mg; ctx.fill();

    // faint halo
    for(let i=1;i<=3;i++){
      ctx.beginPath(); ctx.arc(mx,my,mr+i*12,0,Math.PI*2);
      ctx.strokeStyle=`rgba(190,205,255,${0.025*(4-i)})`;
      ctx.lineWidth=8; ctx.stroke();
    }
  }

  // gentle moving mist layers
  function mistLoop(now){
    const w=mist.width, h=mist.height;
    mctx.clearRect(0,0,w,h);
    mctx.globalCompositeOperation='lighter';
    for(let layer=0; layer<3; layer++){
      const y = (now/20000 + layer*0.15)%1;
      const grad = mctx.createLinearGradient(0,h*y,0,h*y + h*0.35);
      const alpha = 0.06 + layer*0.03;
      grad.addColorStop(0, `rgba(180,190,220,${alpha})`);
      grad.addColorStop(1, `rgba(180,190,220,0)`);
      mctx.fillStyle = grad;
      mctx.fillRect(0, h*y, w, h*0.4);
    }
    requestAnimationFrame(mistLoop);
  }
  requestAnimationFrame(mistLoop);

  // Onboarding: auto-fade after delay, or close on X / first swipe
  function showOnboard(){
    if(!onboard) return;
    // auto fade after 4 seconds
    
  }
  onboardClose.addEventListener('click', dismissOnboard);
  showOnboard();

  // Initial render
  render(idx);
})();
</script>
</body>
</html>
