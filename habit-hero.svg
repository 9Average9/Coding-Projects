<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200">
  <!-- Soft glow behind calendar -->
  <ellipse cx="168" cy="110" rx="72" ry="70" fill="rgba(209,250,229,0.45)"/>

  <!-- ── Coffee mug ── -->
  <!-- Mug body -->
  <rect x="6" y="118" width="58" height="56" rx="10" fill="#155e45"/>
  <!-- Inner highlight -->
  <rect x="14" y="126" width="42" height="40" rx="6" fill="#1a7a58" opacity="0.6"/>
  <!-- Handle -->
  <path d="M64 128 C86 128 86 166 64 166" stroke="#155e45" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Steam wisps -->
  <path d="M24 115 Q28 103 24 91" stroke="#a7c4bc" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M37 113 Q41 99 37 85" stroke="#a7c4bc" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M50 115 Q54 103 50 91" stroke="#a7c4bc" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ── Plant pot ── -->
  <!-- Pot body -->
  <rect x="78" y="136" width="52" height="36" rx="8" fill="#607d8b"/>
  <!-- Pot rim -->
  <rect x="74" y="128" width="60" height="14" rx="8" fill="#546e7a"/>
  <!-- Soil line -->
  <rect x="80" y="136" width="48" height="5" rx="2" fill="#455a64"/>
  <!-- Stem -->
  <line x1="104" y1="128" x2="104" y2="64" stroke="#2d6a4f" stroke-width="4.5"/>
  <!-- Leaves — layered, alternating -->
  <ellipse cx="104" cy="114" rx="30" ry="12" fill="#2d6a4f" transform="rotate(-40 104 114)"/>
  <ellipse cx="104" cy="101" rx="28" ry="11.5" fill="#1b5e40" transform="rotate(34 104 101)"/>
  <ellipse cx="104" cy="89" rx="26" ry="11" fill="#2d6a4f" transform="rotate(-30 104 89)"/>
  <ellipse cx="104" cy="78" rx="23" ry="10" fill="#388e6c" transform="rotate(26 104 78)"/>
  <ellipse cx="104" cy="67" rx="19" ry="8.5" fill="#2d6a4f" transform="rotate(-20 104 67)"/>
  <ellipse cx="104" cy="58" rx="14" ry="7" fill="#3aaa7a" transform="rotate(12 104 58)"/>

  <!-- ── Calendar / flipbook ── -->
  <!-- Shadow -->
  <rect x="135" y="60" width="90" height="120" rx="12" fill="rgba(0,0,0,0.08)" transform="translate(3,4)"/>
  <!-- Body -->
  <rect x="135" y="56" width="90" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Green header band -->
  <rect x="135" y="56" width="90" height="30" rx="12" fill="#dcfce7"/>
  <rect x="135" y="76" width="90" height="10" rx="0" fill="#dcfce7"/>
  <!-- Spiral rings -->
  <rect x="149" y="48" width="9" height="19" rx="4.5" fill="#2d6a4f"/>
  <rect x="168" y="48" width="9" height="19" rx="4.5" fill="#2d6a4f"/>
  <rect x="187" y="48" width="9" height="19" rx="4.5" fill="#2d6a4f"/>
  <rect x="206" y="48" width="9" height="19" rx="4.5" fill="#2d6a4f"/>
  <!-- Day grid — row 1 -->
  <circle cx="153" cy="105" r="10" fill="#dcfce7"/>
  <text x="153" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#166534" font-weight="900">✓</text>
  <circle cx="178" cy="105" r="10" fill="rgba(239,68,68,0.1)"/>
  <text x="178" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#991b1b" font-weight="900">✗</text>
  <circle cx="203" cy="105" r="10" fill="rgba(239,68,68,0.1)"/>
  <text x="203" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#991b1b" font-weight="900">✗</text>
  <!-- Row 2 -->
  <circle cx="153" cy="131" r="10" fill="#dcfce7"/>
  <text x="153" y="136" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#166534" font-weight="900">✓</text>
  <circle cx="178" cy="131" r="10" fill="#dcfce7"/>
  <text x="178" y="136" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#166534" font-weight="900">✓</text>
  <circle cx="203" cy="131" r="10" fill="rgba(239,68,68,0.1)"/>
  <text x="203" y="136" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#991b1b" font-weight="900">✗</text>
  <!-- Row 3 -->
  <circle cx="153" cy="157" r="10" fill="#dcfce7"/>
  <text x="153" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#166534" font-weight="900">✓</text>
  <circle cx="178" cy="157" r="10" fill="#dcfce7"/>
  <text x="178" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#166534" font-weight="900">✓</text>
  <circle cx="203" cy="157" r="10" fill="#dcfce7"/>
  <text x="203" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#166534" font-weight="900">✓</text>
</svg>
