  <line x1="104" y1="91" x2="66" y2="60" stroke="#1e6b42" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="88" y1="78" x2="76" y2="73" stroke="#1e6b42" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Leaf 4: mid-right -->
