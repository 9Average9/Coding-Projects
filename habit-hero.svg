  <line x1="104" y1="105" x2="150" y2="68" stroke="#1b5033" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="124" y1="95" x2="136" y2="88" stroke="#1b5033" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Leaf 3: mid-left -->
